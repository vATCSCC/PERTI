              format: date-time
            ctd:
              type: string
              format: date-time
            cta:
              type: string
              format: date-time
            edct:
              type: string
              format: date-time
        tmi:
          type: object
          properties:
            type:
              type: string
              enum: [GROUND_STOP, GDP, AFP, REROUTE, UNKNOWN]
            program:
