name: Build and deploy PHP app to Azure Web App - vatcscc

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  AZURE_WEBAPP_NAME: 'vatcscc'                 # same as your ADO pipeline
  AZURE_WEBAPP_PACKAGE_PATH: '.'              # deploy repo root
  PHP_VERSION: '8.2'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v4

    # Use PHP 8.2 (similar to your update-alternatives step)
    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: ${{ env.PHP_VERSION }}
        tools: composer
        coverage: none

    # Only run Composer if a composer.json actually exists
    - name: Install PHP dependencies (Composer)
      if: hashFiles('**/composer.json') != ''
      run: |
        composer install --no-interaction --prefer-dist --no-dev

    # Create deployment package excluding non-PHP directories and large static data
    - name: Create deployment package
      run: |
        mkdir -p deploy
        rsync -av --exclude='deploy/' \
                  --exclude='sdk/' \
                  --exclude='.git/' \
                  --exclude='.github/' \
                  --exclude='docs/' \
                  --exclude='DCC/' \
                  --exclude='scripts/tmi/import_historical.php' \
                  --exclude='scripts/tmi/IMPORT_HISTORICAL_README.md' \
                  --exclude='assets/data/backups/' \
                  --exclude='assets/data/logs/' \
                  --exclude='assets/data/T_T100D_SEGMENT_US_CARRIER_ONLY.csv' \
                  --exclude='nul' \
                  . deploy/ || test $? = 24

        # Explicitly copy docs/swim for VATSWIM documentation viewer (swim-doc.php)
        mkdir -p deploy/docs/swim
        cp -r docs/swim/* deploy/docs/swim/
        echo "=== Copied VATSWIM documentation ==="
        ls -la deploy/docs/swim/*.md | head -10

        # Copy docs/stats for network statistics dashboard
        mkdir -p deploy/docs/stats
        cp -r docs/stats/* deploy/docs/stats/
        echo "=== Copied Stats documentation ==="
        ls -la deploy/docs/stats/

    # Verify critical files are in deployment package
    - name: Verify deployment package
      run: |
        echo "=== Verifying deployment package ==="
        echo "scripts/startup.sh:"
        ls -la deploy/scripts/startup.sh || echo "ERROR: startup.sh missing!"
        echo "adl/php/waypoint_eta_daemon.php:"
        ls -la deploy/adl/php/waypoint_eta_daemon.php || echo "ERROR: waypoint_eta_daemon.php missing!"
        echo "=== Scripts directory contents ==="
        ls -la deploy/scripts/*.sh || echo "No .sh files found"
        echo "=== VATSWIM Documentation ==="
        ls -la deploy/docs/swim/*.md 2>/dev/null | head -5 || echo "WARNING: VATSWIM docs missing!"
        echo "=== Stats Documentation ==="
        ls -la deploy/docs/stats/ 2>/dev/null || echo "WARNING: Stats docs missing!"
        echo "=== Deploy package size ==="
        du -sh deploy/

    # Deploy to Azure Web App
    - name: Deploy to Azure Web App
      id: deploy
      uses: azure/webapps-deploy@v3
      continue-on-error: true
      with:
        app-name: ${{ env.AZURE_WEBAPP_NAME }}
        publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_VATCSCC }}
        package: ./deploy

    # If main deploy failed, deploy scripts/ via Kudu VFS API.
    # Running daemons lock their PHP files (HTTP 409) — this is expected
    # and harmless since daemon files rarely change.
    - name: Fix scripts directory if deploy failed
      if: steps.deploy.outcome == 'failure'
      env:
        PUBLISH_PROFILE: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_VATCSCC }}
      run: |
        echo "Main deploy failed — deploying scripts/ via Kudu VFS API..."

        # Extract Kudu SCM credentials from publish profile
        SCM_USER=$(echo "$PUBLISH_PROFILE" | grep -oP 'userName="[^"]*"' | head -1 | sed 's/userName="//;s/"$//')
        SCM_PASS=$(echo "$PUBLISH_PROFILE" | grep -oP 'userPWD="[^"]*"' | head -1 | sed 's/userPWD="//;s/"$//')

        if [ -z "$SCM_USER" ] || [ -z "$SCM_PASS" ]; then
          echo "::error::Failed to extract Kudu credentials from publish profile"
          exit 1
        fi

        # Running daemons lock their source files — 409 is expected for these
        DAEMON_FILES="vatsim_adl_daemon.php archival_daemon.php adl_archive_daemon.php monitoring_daemon.php startup.sh tmi/process_discord_queue.php"

        # Ensure target directories exist
        curl -s -u "$SCM_USER:$SCM_PASS" -X POST \
          -H "Content-Type: application/json" \
          -d '{"command":"mkdir -p /home/site/wwwroot/scripts/tmi","dir":"/home"}' \
          "https://${{ env.AZURE_WEBAPP_NAME }}.scm.azurewebsites.net/api/command" > /dev/null

        # Upload each script file via VFS API
        UNEXPECTED_FAIL=0
        for f in deploy/scripts/*.php deploy/scripts/*.sh deploy/scripts/tmi/*.php; do
          [ -f "$f" ] || continue
          REL_PATH="${f#deploy/}"
          BASENAME="${REL_PATH#scripts/}"
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            -X PUT \
            -u "$SCM_USER:$SCM_PASS" \
            --data-binary @"$f" \
            -H "If-Match: *" \
            --max-time 30 \
            "https://${{ env.AZURE_WEBAPP_NAME }}.scm.azurewebsites.net/api/vfs/site/wwwroot/$REL_PATH")
          if [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "201" ] || [ "$HTTP_CODE" = "204" ]; then
            echo "  OK: $REL_PATH"
          elif [ "$HTTP_CODE" = "409" ] && echo "$DAEMON_FILES" | grep -qw "$BASENAME"; then
            echo "  SKIP (locked by running daemon): $REL_PATH"
          else
            echo "  FAIL ($HTTP_CODE): $REL_PATH"
            UNEXPECTED_FAIL=1
          fi
        done

        if [ "$UNEXPECTED_FAIL" = "1" ]; then
          echo "::error::Unexpected failures uploading scripts via VFS fallback"
          exit 1
        fi

        echo "Scripts directory fallback deploy complete."

    - name: Confirm deployment status
      if: always()
      run: |
        if [ "${{ steps.deploy.outcome }}" = "success" ]; then
          echo "Deployment succeeded on first attempt."
        else
          echo "::notice::Primary deploy hit Kudu rsync lock on running daemons. Non-daemon scripts patched via VFS API fallback."
        fi
