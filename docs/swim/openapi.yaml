            type:
              type: string
            icao:
              type: string
            weight_class:
              type: string
            wake_category:
              type: string
            airline_icao:
              type: string
            airline_name:
              type: string
        route:
          type: object
          properties:
            departure:
              type: string
            destination:
              type: string
            alternate:
              type: string
            departure_artcc:
              type: string
            destination_artcc:
              type: string
            departure_fix:
              type: string
            arrival_fix:
              type: string
        position:
          type: object
          properties:
            latitude:
              type: number
            longitude:
              type: number
            altitude_ft:
              type: integer
            ground_speed_kts:
              type: integer
            heading:
              type: integer
            phase:
              type: string
            current_artcc:
              type: string
        progress:
          type: object
          properties:
            distance_remaining_nm:
              type: number
            gcd_nm:
              type: number
