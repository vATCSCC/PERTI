      responses:
        '200':
          description: MINIT restrictions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MinitListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /tmi/afp:
    get:
      tags:
        - TMI
      summary: List Airspace Flow Programs
      description: |
