            programs:
              type: array
              items:
                $ref: '#/components/schemas/GdpProgram'
            total:
              type: integer
            server_utc:
              type: string
              format: date-time

    GdpCreateRequest:
      type: object
      required:
        - gdp_airport
        - gdp_start
        - gdp_end
        - program_rate
      properties:
        gdp_airport:
          type: string
          description: Destination airport (ICAO)
          example: KATL
        gdp_start:
          type: string
          format: date-time
        gdp_end:
          type: string
          format: date-time
        program_rate:
          type: integer
          description: Default arrivals per hour
          example: 60
        program_rates_hourly:
          type: object
          description: Hourly rates override {"0":30,"1":35,...}
          additionalProperties:
            type: integer
        reserve_rate:
          type: integer
          default: 0
          description: Reserved slots per hour
        reserve_rates_hourly:
          type: object
          additionalProperties:
            type: integer
        delay_limit:
          type: integer
          default: 180
          description: Maximum assignable delay in minutes
        gdp_origin_airports:
          type: string
          description: Origin airports (space-delimited)
        gdp_origin_centers:
          type: string
          description: Origin ARTCCs (space-delimited)
          example: "ZTL ZJX ZDC"
        distance_nm:
          type: integer
          description: Distance-based scope (0 = disabled)
        gdp_flt_incl_type:
          type: string
          enum: [ALL, JET, PROP]
          default: ALL
        gdp_flt_incl_carrier:
          type: string
          description: Carrier filter (space-delimited)
        exemptions:
          type: object
          properties:
            airborne:
              type: boolean
            orig_airports:
              type: string
            orig_artccs:
              type: string
            carriers:
              type: string
        impacting_condition:
          type: string
        adv_number:
          type: string

    GdpSimulateResponse:
      type: object
      properties:
        status:
          type: string
        message:
          type: string
        program_id:
          type: string
        filters:
          type: object
        summary:
          type: object
          properties:
            total_flights:
              type: integer
            assigned_flights:
              type: integer
            stack_flights:
              type: integer
              description: Flights beyond program end
            total_slots:
              type: integer
            open_slots:
              type: integer
            slot_utilization:
              type: number
            avg_delay_min:
              type: number
            max_delay_min:
              type: integer
            sum_delay_min:
              type: integer
        flights:
          type: array
          items:
            $ref: '#/components/schemas/GdpFlight'
        slots:
          type: array
          items:
            $ref: '#/components/schemas/GdpSlot'

    GdpFlight:
      type: object
      description: Flight with GDP slot assignment
      properties:
        id:
          type: integer
        flight_key:
          type: string
        callsign:
          type: string
        fp_dept_icao:
          type: string
        fp_dest_icao:
          type: string
        major_carrier:
          type: string
        gdp_program_id:
          type: string
        gdp_slot_index:
          type: integer
        gdp_slot_time_utc:
          type: string
          format: date-time
          description: CTA (Controlled Time of Arrival)
        gdp_original_eta_utc:
          type: string
          format: date-time
        cta_utc:
          type: string
          format: date-time
        ctd_utc:
          type: string
          format: date-time
          description: Controlled Time of Departure
        program_delay_min:
          type: integer
          description: Assigned delay in minutes
        ctl_type:
          type: string
          enum: [GDP, GDP-CAP, GDP-STK]
          description: "GDP=normal, GDP-CAP=delay capped, GDP-STK=stack (no slot)"
        delay_status:
          type: string
        ctl_exempt:
          type: boolean
        ctl_exempt_reason:
          type: string

    GdpSlot:
      type: object
      description: GDP arrival slot
      properties:
        id:
          type: integer
        program_id:
          type: string
        slot_index:
          type: integer
        slot_time_utc:
          type: string
          format: date-time
          description: Arrival slot time (CTA)
        slot_type:
          type: string
          enum: [REGULAR, RESERVED]
        slot_status:
          type: string
          enum: [OPEN, ASSIGNED, BRIDGED, HELD, CANCELLED]
        bin_hour:
          type: integer
          description: Hour bucket (0-23)
        bin_quarter:
          type: integer
          enum: [0, 15, 30, 45]
        assigned_flight_key:
          type: string
        assigned_callsign:
          type: string
        assigned_carrier:
          type: string
        assigned_origin:
          type: string
        assigned_utc:
          type: string
          format: date-time

    GdpFlightsResponse:
      type: object
      properties:
        status:
          type: string
        program_id:
          type: string
        flights:
          type: array
          items:
            $ref: '#/components/schemas/GdpFlight'
        summary:
          type: object
          properties:
            total:
              type: integer
            assigned:
              type: integer
            exempt:
              type: integer
            avg_delay_min:
              type: number

    GdpSlotsResponse:
      type: object
      properties:
        status:
          type: string
        program_id:
          type: string
        slots:
          type: array
          items:
            $ref: '#/components/schemas/GdpSlot'
        summary:
          type: object
          properties:
            total_slots:
              type: integer
            open_slots:
              type: integer
            assigned_slots:
              type: integer
            utilization:
              type: number

    MitRestriction:
      type: object
      description: Miles-In-Trail restriction (FIXM-aligned)
      properties:
        id:
          type: integer
        restriction_type:
          type: string
          enum: [MIT]
        facility:
          type: string
          description: Issuing facility (ARTCC)
          example: ZNY
        fix:
          type: string
          description: Affected fix/waypoint (constraintFix)
          example: CAMRN
        value_nm:
          type: integer
          description: Spacing value in nautical miles (spacingValue)
          example: 15
        direction:
          type: string
          enum: [EAST, WEST, NORTH, SOUTH, ALL]
          description: Flow direction
        altitude_min:
          type: integer
          description: Minimum altitude (FL)
        altitude_max:
          type: integer
          description: Maximum altitude (FL)
        start_utc:
          type: string
          format: date-time
        end_utc:
          type: string
          format: date-time
        status:
          type: string
          enum: [ACTIVE, EXPIRED, CANCELLED]
        reason:
          type: string
        created_by:
          type: string
        created_utc:
          type: string
          format: date-time

    MitListResponse:
      type: object
      properties:
        status:
          type: string
        data:
          type: object
          properties:
            restrictions:
              type: array
              items:
                $ref: '#/components/schemas/MitRestriction'
            total:
              type: integer
            active_count:
              type: integer

    MinitRestriction:
      type: object
      description: Minutes-In-Trail restriction (FIXM-aligned)
      properties:
        id:
          type: integer
        restriction_type:
          type: string
          enum: [MINIT]
        facility:
          type: string
          description: Issuing facility
          example: ZBW
        fix:
          type: string
          description: Affected fix/waypoint
        value_min:
          type: integer
          description: Spacing value in minutes (spacingValue)
          example: 3
        direction:
          type: string
          enum: [EAST, WEST, NORTH, SOUTH, ALL]
        altitude_min:
          type: integer
        altitude_max:
          type: integer
        start_utc:
          type: string
          format: date-time
        end_utc:
          type: string
          format: date-time
        status:
          type: string
          enum: [ACTIVE, EXPIRED, CANCELLED]
        reason:
          type: string
        created_by:
          type: string
        created_utc:
          type: string
          format: date-time

    MinitListResponse:
      type: object
      properties:
        status:
          type: string
        data:
          type: object
          properties:
            restrictions:
              type: array
              items:
                $ref: '#/components/schemas/MinitRestriction'
            total:
              type: integer
            active_count:
              type: integer

    AfpProgram:
      type: object
      description: Airspace Flow Program (FIXM-aligned)
      properties:
        program_id:
          type: integer
        program_name:
          type: string
          example: AFP-FCA_EAST-01161400
        program_type:
          type: string
          enum: [AFP]
        fca:
          type: string
          description: Flow Constraint Area identifier (flowConstraintArea)
          example: FCA_EAST
        status:
          type: string
          enum: [PROPOSED, ACTIVE, COMPLETED, PURGED]
        start_utc:
          type: string
          format: date-time
        end_utc:
          type: string
          format: date-time
        program_rate:
          type: integer
          description: Traffic rate through FCA
        impacting_condition:
          type: string
        reason:
          type: string
        total_flights:
          type: integer
        controlled_flights:
          type: integer
        avg_delay_min:
          type: number
        created_by:
          type: string
        created_utc:
          type: string
          format: date-time

    AfpListResponse:
      type: object
      properties:
        status:
          type: string
        data:
          type: object
          properties:
            programs:
              type: array
              items:
                $ref: '#/components/schemas/AfpProgram'
            total:
              type: integer
            active_count:
              type: integer

    FlowEvaluationArea:
      type: object
      description: Flow Evaluation Area definition (FIXM-aligned)
      properties:
        fea_id:
          type: string
          description: FEA identifier (flowEvaluationAreaId)
          example: ZNY_METRO
        name:
          type: string
          description: Human-readable name
          example: NY Metro Area
        artcc:
          type: string
          description: Responsible ARTCC
          example: ZNY
        airports:
          type: array
          description: Affected airports (affectedAerodromes)
          items:
            type: string
          example: [KJFK, KLGA, KEWR, KTEB]
        status:
          type: string
          enum: [ACTIVE, INACTIVE]
        boundary:
          type: object
          description: GeoJSON geometry (boundaryGeometry)
          properties:
            type:
              type: string
              enum: [Polygon, MultiPolygon]
            coordinates:
              type: array
              description: GeoJSON coordinates array
              items:
                type: array
                items:
                  type: number
        created_utc:
          type: string
          format: date-time
        updated_utc:
          type: string
          format: date-time

    FeaListResponse:
      type: object
      properties:
        status:
          type: string
        data:
          type: object
          properties:
            feas:
              type: array
              items:
                $ref: '#/components/schemas/FlowEvaluationArea'
            total:
              type: integer

    TaxiTimeReference:
      type: object
      description: Airport unimpeded taxi-out reference time (FAA ASPM methodology)
      properties:
        airport_icao:
          type: string
          description: ICAO airport code
          example: KJFK
        unimpeded_taxi_out_sec:
          type: integer
          description: Unimpeded taxi-out time in seconds (p5-p15 average)
          example: 1020
        sample_count:
          type: integer
          description: Number of observations in 90-day rolling window
          example: 2847
        confidence:
          type: string
          enum: [HIGH, MEDIUM, LOW, DEFAULT]
          description: Data quality based on sample count
          example: HIGH
        percentile_5:
          type: integer
          description: 5th percentile taxi-out time (seconds)
          example: 480
        percentile_15:
          type: integer
          description: 15th percentile taxi-out time (seconds)
          example: 720
        last_refreshed_utc:
          type: string
          format: date-time
          description: Last refresh timestamp

    TaxiTimeDetail:
      type: object
      description: Dimensional taxi time breakdown
      properties:
        dimension:
          type: string
          enum: [WEIGHT_CLASS, CARRIER, ENGINE_CONFIG, DEST_REGION]
          description: Breakdown dimension type
        dimension_value:
          type: string
          description: Value for the dimension (e.g., H, UAL, JET_TWIN)
          example: H
        unimpeded_taxi_out_sec:
          type: integer
          description: Dimension-specific unimpeded taxi time (seconds)
        sample_count:
          type: integer
          description: Dimension-specific observation count

    TaxiTimeListResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: object
          properties:
            airports:
              type: array
              items:
                $ref: '#/components/schemas/TaxiTimeReference'
            count:
              type: integer
            summary:
              type: object
              properties:
                high_confidence:
                  type: integer
                medium_confidence:
                  type: integer
                low_confidence:
                  type: integer
                default:
                  type: integer
            methodology:
              type: object
              properties:
                description:
                  type: string
                min_samples:
                  type: integer
                default_taxi_sec:
                  type: integer
                refresh_schedule:
                  type: string
        timestamp:
          type: string
          format: date-time

    TaxiTimeDetailResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: object
          properties:
            airport:
              $ref: '#/components/schemas/TaxiTimeReference'
            details:
              type: array
              items:
                $ref: '#/components/schemas/TaxiTimeDetail'
            detail_count:
              type: integer
            methodology:
              type: object
        timestamp:
          type: string
          format: date-time
