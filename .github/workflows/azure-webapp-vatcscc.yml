name: Build and deploy PHP app to Azure Web App - vatcscc

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  AZURE_WEBAPP_NAME: 'vatcscc'                 # same as your ADO pipeline
  AZURE_WEBAPP_PACKAGE_PATH: '.'              # deploy repo root
  PHP_VERSION: '8.2'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v4

    # Use PHP 8.2 (similar to your update-alternatives step)
    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: ${{ env.PHP_VERSION }}
        tools: composer
        coverage: none

    # Only run Composer if a composer.json actually exists
    - name: Install PHP dependencies (Composer)
      if: hashFiles('**/composer.json') != ''
      run: |
        composer install --no-interaction --prefer-dist --no-dev

    # Create deployment package excluding non-PHP directories
    - name: Create deployment package
      run: |
        mkdir -p deploy
        rsync -av --exclude='deploy/' \
                  --exclude='sdk/' \
                  --exclude='.git/' \
                  --exclude='.github/' \
                  --exclude='docs/' \
                  --exclude='DCC/' \
                  --exclude='scripts/tmi/import_historical.php' \
                  --exclude='scripts/tmi/IMPORT_HISTORICAL_README.md' \
                  --exclude='nul' \
                  . deploy/ || test $? = 24

        # Explicitly copy docs/swim for VATSWIM documentation viewer (swim-doc.php)
        mkdir -p deploy/docs/swim
        cp -r docs/swim/* deploy/docs/swim/
        echo "=== Copied VATSWIM documentation ==="
        ls -la deploy/docs/swim/*.md | head -10

        # Copy docs/stats for network statistics dashboard
        mkdir -p deploy/docs/stats
        cp -r docs/stats/* deploy/docs/stats/
        echo "=== Copied Stats documentation ==="
        ls -la deploy/docs/stats/

    # Verify critical files are in deployment package
    - name: Verify deployment package
      run: |
        echo "=== Verifying deployment package ==="
        echo "scripts/startup.sh:"
        ls -la deploy/scripts/startup.sh || echo "ERROR: startup.sh missing!"
        echo "adl/php/waypoint_eta_daemon.php:"
        ls -la deploy/adl/php/waypoint_eta_daemon.php || echo "ERROR: waypoint_eta_daemon.php missing!"
        echo "=== Scripts directory contents ==="
        ls -la deploy/scripts/*.sh || echo "No .sh files found"
        echo "=== VATSWIM Documentation ==="
        ls -la deploy/docs/swim/*.md 2>/dev/null | head -5 || echo "WARNING: VATSWIM docs missing!"
        echo "=== Stats Documentation ==="
        ls -la deploy/docs/stats/ 2>/dev/null || echo "WARNING: Stats docs missing!"

    # Deploy to Azure Web App via Kudu ZIP API (avoids parallel rsync race condition)
    - name: Deploy to Azure Web App
      env:
        PUBLISH_PROFILE: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_VATCSCC }}
      run: |
        # Create deployment ZIP
        cd deploy && zip -qr /tmp/deploy.zip . && cd ..
        ZIP_SIZE=$(du -h /tmp/deploy.zip | cut -f1)
        echo "Deployment ZIP: $ZIP_SIZE"

        # Extract Kudu SCM credentials from publish profile
        SCM_USER=$(echo "$PUBLISH_PROFILE" | grep -oP 'userName="[^"]*"' | head -1 | sed 's/userName="//;s/"$//')
        SCM_PASS=$(echo "$PUBLISH_PROFILE" | grep -oP 'userPWD="[^"]*"' | head -1 | sed 's/userPWD="//;s/"$//')

        if [ -z "$SCM_USER" ] || [ -z "$SCM_PASS" ]; then
          echo "::error::Failed to extract Kudu credentials from publish profile"
          exit 1
        fi

        echo "Deploying to Kudu ZIP API (sequential extraction)..."

        # Deploy via Kudu /api/zip/ endpoint — extracts sequentially, no parallel rsync
        HTTP_CODE=$(curl -s -o /tmp/deploy_response.txt -w "%{http_code}" \
          -X PUT \
          -u "$SCM_USER:$SCM_PASS" \
          --data-binary @/tmp/deploy.zip \
          -H "Content-Type: application/zip" \
          --max-time 600 \
          "https://${{ env.AZURE_WEBAPP_NAME }}.scm.azurewebsites.net/api/zip/site/wwwroot/")

        echo "Kudu response: HTTP $HTTP_CODE"

        if [ "$HTTP_CODE" = "200" ]; then
          echo "Deployment successful!"
        else
          echo "::warning::Primary deploy returned HTTP $HTTP_CODE, retrying..."
          cat /tmp/deploy_response.txt 2>/dev/null || true
          sleep 10

          HTTP_CODE=$(curl -s -o /tmp/deploy_response2.txt -w "%{http_code}" \
            -X PUT \
            -u "$SCM_USER:$SCM_PASS" \
            --data-binary @/tmp/deploy.zip \
            -H "Content-Type: application/zip" \
            --max-time 600 \
            "https://${{ env.AZURE_WEBAPP_NAME }}.scm.azurewebsites.net/api/zip/site/wwwroot/")

          if [ "$HTTP_CODE" = "200" ]; then
            echo "Retry deployment successful!"
          else
            echo "::error::Deploy failed after retry with HTTP $HTTP_CODE"
            cat /tmp/deploy_response2.txt 2>/dev/null || true
            exit 1
          fi
        fi

        # Verify critical files
        VERIFY=$(curl -s -u "$SCM_USER:$SCM_PASS" \
          -X POST -H "Content-Type: application/json" \
          -d '{"command":"ls scripts/startup.sh scripts/vatsim_adl_daemon.php scripts/tmi/process_discord_queue.php","dir":"/home/site/wwwroot"}' \
          "https://${{ env.AZURE_WEBAPP_NAME }}.scm.azurewebsites.net/api/command")

        echo "Verification: $VERIFY"
