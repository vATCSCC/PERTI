; VATSWIM AOC Client Configuration

[swim]
base_url = https://perti.vatcscc.org
api_key = YOUR_SWIM_API_KEY

[client]
; Simulator: msfs, xplane, p3d
simulator = msfs
; Poll interval in seconds
poll_interval = 5
; Locale
locale = en-US
; Enable verbose logging
debug = false

[telemetry]
; Push position updates
position_enabled = true
; Push OOOI events
oooi_enabled = true
; Position report interval (seconds)
position_interval = 15
; Minimum altitude change to report (feet)
altitude_threshold = 100
; Minimum distance change to report (nm)
distance_threshold = 1.0
