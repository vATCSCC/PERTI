        - name: active_only
          in: query
          description: Only return active programs
          schema:
            type: boolean
            default: true
      responses:
        '200':
          description: AFP programs
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AfpListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /fea:
