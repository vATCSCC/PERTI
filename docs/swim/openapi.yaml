            application/json:
              schema:
                $ref: '#/components/schemas/FeaListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /jatoc/incidents:
    get:
      tags:
        - JATOC
      summary: Get JATOC Incidents
      description: |
        Returns JATOC (Joint Air Traffic Operations Center) incident records.
        Incidents track operational issues affecting ATC facilities.
      operationId: getJatocIncidents
      parameters:
        - name: lifecycle_status
          in: query
          description: Filter by lifecycle status
          schema:
            type: string
            enum: [OPEN, IN_PROGRESS, RESOLVED, CLOSED]
        - name: facility
          in: query
          description: Filter by facility (partial match)
          schema:
            type: string
          example: KJFK
        - name: facilities
          in: query
          description: Filter by multiple facilities (comma-separated, exact match)
          schema:
            type: string
          example: "KJFK,KEWR,KLGA"
        - name: facility_type
          in: query
          description: Filter by facility type
          schema:
            type: string
            enum: [ARTCC, TRACON, ATCT, FSS]
        - name: incident_type
          in: query
          description: Filter by incident type
          schema:
            type: string
        - name: limit
          in: query
          description: Results per page
          schema:
            type: integer
            default: 50
            maximum: 100
        - name: offset
          in: query
          description: Pagination offset
          schema:
            type: integer
            default: 0
      responses:
        '200':
          description: JATOC incidents
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JatocIncidentsResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /splits/presets:
    get:
      tags:
        - Configuration
      summary: Get Runway Split Presets
      description: |
        Returns saved runway configuration presets.
        Presets define runway configurations for airports (arrivals, departures, rates).
      operationId: getSplitPresets
      parameters:
        - name: artcc
          in: query
          description: Filter by ARTCC
          schema:
            type: string
          example: ZNY
        - name: airport
          in: query
          description: Filter by airport
          schema:
            type: string
          example: KJFK
        - name: id
          in: query
          description: Get single preset by ID
          schema:
            type: integer
      responses:
        '200':
          description: Split presets
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SplitPresetsResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /routes/cdrs:
    get:
      tags:
        - Routes
      summary: List Coded Departure Routes
      description: |
        Returns Coded Departure Routes (CDRs) from the VATSIM_REF reference database.
        Supports filtering by origin/destination airport, CDR code, ARTCC, and free-text search.
        Data is refreshed daily from the authoritative `cdrs.csv` source.

        **Use Cases:**
        - Route planning tools: find CDRs between airport pairs
        - ARTCC-scoped route catalogs: `?artcc=ZNY`
        - Route string search: `?search=GREKI` to find routes through a fix
      operationId: listCDRs
      parameters:
        - name: origin
          in: query
          description: Filter by origin ICAO code (case-insensitive)
          schema:
            type: string
            minLength: 3
            maxLength: 4
          example: KJFK
        - name: dest
          in: query
          description: Filter by destination ICAO code (case-insensitive)
          schema:
            type: string
            minLength: 3
            maxLength: 4
          example: KORD
        - name: code
          in: query
          description: Filter by CDR code (prefix match)
          schema:
            type: string
          example: JFKORD
        - name: search
          in: query
          description: Free-text search across CDR code and route string
          schema:
            type: string
          example: GREKI
        - name: artcc
          in: query
          description: Filter by departure OR arrival ARTCC. Aliases "fir" and "acc" are also accepted.
          schema:
            type: string
            minLength: 2
            maxLength: 4
          example: ZNY
        - name: dep_artcc
          in: query
          description: Filter by departure ARTCC only. Aliases "dep_fir" and "dep_acc" are also accepted.
          schema:
            type: string
        - name: arr_artcc
          in: query
          description: Filter by arrival ARTCC only. Aliases "arr_fir" and "arr_acc" are also accepted.
          schema:
            type: string
        - name: include
          in: query
          description: |
            Comma-separated list of additional data to include. Supported values:
            - `geometry`: Adds GeoJSON route geometry, waypoints, distance_nm, and artccs_traversed via PostGIS.
              Slower than standard queries. Keep per_page low (10-20) for geometry requests.
          schema:
            type: string
          example: geometry
        - name: page
          in: query
          description: Page number (default 1)
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: per_page
          in: query
          description: Results per page (default 50, max 200)
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 50
      responses:
        '200':
          description: Paginated list of CDRs
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/CDR'
                  pagination:
                    $ref: '#/components/schemas/Pagination'
                  metadata:
                    type: object
                    properties:
                      generated:
                        type: string
                        format: date-time
                      source:
                        type: string
        '405':
          description: Method not allowed (only GET supported)
        '503':
          description: Reference database unavailable

  /playbook/plays:
    get:
      tags:
        - Routes
      summary: List Playbook Plays
      description: |
        Returns playbook plays and their routes. Supports filtering by category,
        source, ARTCC, and search. Use `?id=123` to fetch a single play with its full routes.
        Data is refreshed daily for FAA-source plays.
      operationId: listPlaybookPlays
      parameters:
        - name: id
          in: query
          description: Fetch a single play by ID (includes full routes)
          schema:
            type: integer
        - name: category
          in: query
          description: Filter by play category
          schema:
            type: string
        - name: source
          in: query
          description: Filter by data source (FAA, DCC, ECFMP, CANOC)
          schema:
            type: string
            enum: [FAA, DCC, ECFMP, CANOC]
        - name: search
          in: query
          description: Search play name or description
          schema:
            type: string
        - name: artcc
          in: query
          description: Filter by ARTCC in facilities_involved. Aliases "fir" and "acc" are also accepted.
          schema:
            type: string
        - name: status
          in: query
          description: Filter by play status
          schema:
            type: string
            enum: [active, draft, archived]
            default: active
        - name: include
          in: query
          description: |
            Comma-separated list of additional data to include. Supported values:
            - `geometry`: Adds GeoJSON route geometry, waypoints, distance_nm, and artccs_traversed to each route (single-play mode only).
          schema:
            type: string
          example: geometry
        - name: page
          in: query
          description: Page number
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: per_page
          in: query
          description: Results per page (max 200)
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 50
      responses:
        '200':
          description: Paginated list of plays (or single play with routes if id provided)
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/PlaybookPlay'
                  pagination:
                    $ref: '#/components/schemas/Pagination'
        '404':
          description: Play not found (when id specified)
        '503':
          description: Database unavailable

  /reference/taxi-times:
    get:
      tags:
        - Reference
      summary: Airport Taxi-Out Reference Times
      description: |
        Returns unimpeded taxi-out reference times for all airports, computed using
        FAA ASPM methodology (average of p5-p15 percentile observations over a 90-day
        rolling window, minimum 50 samples).

        Data refreshes daily at 02:00Z via stored procedure.
      operationId: getTaxiTimes
      parameters:
        - name: confidence
          in: query
          description: Filter by confidence level
          schema:
            type: string
            enum: [HIGH, MEDIUM, LOW, DEFAULT]
        - name: min_samples
          in: query
          description: Minimum sample count filter
          schema:
            type: integer
            minimum: 0
        - name: format
          in: query
          description: Response format
          schema:
            type: string
            enum: [json, fixm, xml, csv, ndjson]
            default: json
      responses:
        '200':
          description: List of airport taxi reference times
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaxiTimeListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /reference/taxi-times/{airport}:
    get:
      tags:
        - Reference
      summary: Airport Taxi-Out Reference Detail
      description: |
        Returns unimpeded taxi-out reference time for a single airport, including
        dimensional breakdowns by weight class, carrier, engine configuration,
        and destination region.
      operationId: getTaxiTimeDetail
      parameters:
        - name: airport
          in: path
          required: true
          description: ICAO airport code (e.g., KJFK, KLAX)
          schema:
            type: string
            minLength: 3
            maxLength: 4
          example: KJFK
        - name: format
          in: query
          description: Response format
          schema:
            type: string
            enum: [json, fixm, xml, csv, ndjson]
            default: json
      responses:
        '200':
          description: Airport taxi reference with dimensional breakdown
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaxiTimeDetailResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: Airport not found in taxi reference data

  # ==========================================================================
  # Health & Infrastructure
  # ==========================================================================

  /health:
    get:
      tags:
        - Infrastructure
      summary: API Health Check
      description: |
        Returns health status and metrics for the VATSWIM API infrastructure,
        including database connectivity, sync freshness, WebSocket server status,
        cache hit rates, and rate limit configuration.
      operationId: getHealth
      security:
        - bearerAuth: []
        - apiKeyHeader: []
      responses:
        '200':
          description: Health status (may include status degraded)
          content:
            application/json:
              schema:
                type: object
                properties:
                  api:
                    type: string
                    example: VATSWIM
                  version:
                    type: string
                    example: '1.0.0'
                  timestamp_utc:
                    type: string
                    format: date-time
                  status:
                    type: string
                    enum: [healthy, degraded, unhealthy]
                  checks:
                    type: object
                    properties:
                      database:
                        type: object
                      api_keys:
                        type: object
                      websocket:
                        type: object
                      cache:
                        type: object
                      rate_limits:
                        type: object
        '401':
          $ref: '#/components/responses/Unauthorized'
        '503':
          description: API is unhealthy

  /controllers:
    get:
      tags:
        - Controllers
      summary: List ATC Controllers
      description: |
        Returns active ATC controller data from the SWIM_API database, enriched
        with vNAS ERAM/STARS sector assignments where available. Supports filtering
        by callsign, facility type, ARTCC, and controller rating.
      operationId: listControllers
      security:
        - bearerAuth: []
        - apiKeyHeader: []
      parameters:
        - name: status
          in: query
          description: Filter by online status
          schema:
            type: string
            enum: [active, all]
            default: active
        - name: callsign
          in: query
          description: Filter by callsign pattern (supports * wildcard)
          schema:
            type: string
          example: ZDC_*
        - name: facility_type
          in: query
          description: Comma-separated facility type filter
          schema:
            type: string
          example: CTR,APP
        - name: facility_id
          in: query
          description: Comma-separated facility ID filter
          schema:
            type: string
          example: ZDC,ZNY
        - name: artcc
          in: query
          description: Comma-separated ARTCC filter
          schema:
            type: string
          example: ZDC,ZNY,ZBW
        - name: summary
          in: query
          description: Return facility staffing aggregation instead of individual controllers
          schema:
            type: string
            enum: ['true', 'false']
        - $ref: '#/components/parameters/page'
        - $ref: '#/components/parameters/per_page'
        - $ref: '#/components/parameters/format'
      responses:
        '200':
          description: Paginated list of controllers
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  # ==========================================================================
  # CDM (Collaborative Decision Making)
  # ==========================================================================

  /cdm/airport-status:
    get:
      tags:
        - CDM
      summary: CDM Airport Operational Status
      description: |
        Returns A-CDM style airport operational picture including departure queue
        composition, gate-hold metrics, weather conditions, and acceptance rates.
        Optionally returns historical snapshots (up to 24h).
      operationId: getCdmAirportStatus
      security:
        - bearerAuth: []
        - apiKeyHeader: []
      parameters:
        - name: airport
          in: query
          required: true
          description: ICAO airport code
          schema:
            type: string
            minLength: 4
            maxLength: 4
          example: KJFK
        - name: history
          in: query
          description: Set to 1 to return historical snapshots instead of current status
          schema:
            type: string
            enum: ['0', '1']
            default: '0'
        - name: limit
          in: query
          description: Number of historical snapshots (max 288 = 24h at 5-min intervals)
          schema:
            type: integer
            minimum: 1
            maximum: 288
            default: 24
      responses:
        '200':
          description: Airport CDM status
        '400':
          description: Missing or invalid airport parameter
        '401':
          $ref: '#/components/responses/Unauthorized'

  /cdm/compliance:
    get:
      tags:
        - CDM
      summary: CDM Compliance Data
      description: |
        Returns real-time compliance data for flights under TMI control, including
        EDCT adherence, TOBT accuracy, and milestone completion status.
      operationId: getCdmCompliance
      security:
        - bearerAuth: []
        - apiKeyHeader: []
      parameters:
        - name: program_id
          in: query
          description: Filter by TMI program ID
          schema:
            type: integer
        - name: flight_uid
          in: query
          description: Filter by flight UID
          schema:
            type: integer
        - name: airport
          in: query
          description: Filter by airport ICAO code
          schema:
            type: string
          example: KJFK
        - name: status
          in: query
          description: Filter by compliance status
          schema:
            type: string
            enum: [COMPLIANT, NON_COMPLIANT, AT_RISK, PENDING]
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 500
            default: 100
      responses:
        '200':
          description: Compliance records
        '401':
          $ref: '#/components/responses/Unauthorized'

  /cdm/metrics:
    get:
      tags:
        - CDM
      summary: CDM Effectiveness Metrics
      description: |
        Returns CDM effectiveness metrics including EDCT delivery rates,
        compliance rates, pilot participation, and readiness signal adoption.
      operationId: getCdmMetrics
      security:
        - bearerAuth: []
        - apiKeyHeader: []
      parameters:
        - name: program_id
          in: query
          description: Filter metrics for a specific TMI program
          schema:
            type: integer
      responses:
        '200':
          description: CDM metrics
        '401':
          $ref: '#/components/responses/Unauthorized'

  /cdm/readiness:
    get:
      tags:
        - CDM
      summary: Get Flight Readiness State
      description: |
        Returns the current CDM readiness state for a flight, including TOBT,
        readiness signal, and associated milestones.
      operationId: getCdmReadiness
      security:
        - bearerAuth: []
        - apiKeyHeader: []
      parameters:
        - name: callsign
          in: query
          description: Aircraft callsign
          schema:
            type: string
          example: AAL123
        - name: airport
          in: query
          description: Filter by departure airport
          schema:
            type: string
          example: KJFK
      responses:
        '200':
          description: Readiness state
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      tags:
        - CDM
      summary: Update Flight Readiness State
      description: |
        Allows pilots to signal readiness state and report TOBT (Target Off-Block Time).
        Requires write access.
      operationId: updateCdmReadiness
      security:
        - bearerAuth: []
        - apiKeyHeader: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - callsign
                - state
              properties:
                callsign:
                  type: string
                  example: AAL123
                state:
                  type: string
                  enum: [PLANNING, BOARDING, READY, TAXIING, CANCELLED]
                tobt_utc:
                  type: string
                  format: date-time
                  example: '2026-03-23T14:30:00Z'
      responses:
        '200':
          description: Readiness updated
        '400':
          description: Validation error
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: Write access required

  /cdm/status:
    get:
      tags:
        - CDM
      summary: Flight CDM Status
      description: |
        Returns comprehensive CDM status for a single flight including milestones,
        readiness, TMI control, compliance, and pending messages.
      operationId: getCdmStatus
      security:
        - bearerAuth: []
        - apiKeyHeader: []
      parameters:
        - name: callsign
          in: query
          description: Aircraft callsign (one of callsign or flight_uid required)
          schema:
            type: string
          example: AAL123
        - name: flight_uid
          in: query
          description: Internal flight UID (one of callsign or flight_uid required)
          schema:
            type: integer
      responses:
        '200':
          description: Flight CDM status with milestones and compliance
        '400':
          description: Missing callsign or flight_uid
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: Flight not found

  # ==========================================================================
  # Connectors
  # ==========================================================================

  /connectors/health:
    get:
      tags:
        - Infrastructure
      summary: Connector Health Summary
      description: |
        Lightweight aggregate health check across all VATSWIM external connectors.
        Returns overall status (OK/DEGRADED/DOWN) and per-connector summary.
      operationId: getConnectorsHealth
      security:
        - bearerAuth: []
        - apiKeyHeader: []
      responses:
        '200':
          description: Connector health summary
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [OK, DEGRADED, DOWN]
                  connectors:
                    type: array
                    items:
                      type: object
                      properties:
                        name:
                          type: string
                          example: vNAS
                        key:
                          type: string
                          example: vnas
                        status:
                          type: string
                          enum: [OK, DEGRADED, DOWN]
                  checked_at:
                    type: string
                    format: date-time
        '401':
          $ref: '#/components/responses/Unauthorized'

  /connectors/status:
    get:
      tags:
        - Infrastructure
      summary: Connector Detailed Status
      description: |
        Detailed per-connector status including health, circuit breaker state,
        endpoints, configuration, and daemon status. Requires system or partner tier.
      operationId: getConnectorsStatus
      security:
        - bearerAuth: []
        - apiKeyHeader: []
      responses:
        '200':
          description: Detailed connector status
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: Requires system or partner tier API key

  # ==========================================================================
  # CTP (Cross the Pond)
  # ==========================================================================

  /ctp/sessions:
    get:
      tags:
        - CTP
      summary: List CTP Sessions
      description: |
        Returns CTP event sessions with throughput configurations and flight statistics.
        Without parameters, lists all ACTIVE/DRAFT/MONITORING sessions.
        With session_id, returns detailed session data including throughput configs.
      operationId: listCtpSessions
      security:
        - bearerAuth: []
        - apiKeyHeader: []
      parameters:
        - name: session_id
          in: query
          description: Get a specific session with full details
          schema:
            type: integer
        - name: status
          in: query
          description: Filter by session status
          schema:
            type: string
            enum: [DRAFT, ACTIVE, MONITORING, COMPLETED, CANCELLED]
      responses:
        '200':
          description: CTP sessions
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: Session not found (when session_id specified)

  # ==========================================================================
  # Additional Ingest Endpoints
  # ==========================================================================

  /ingest/acars:
    post:
      tags:
        - Ingest
      summary: ACARS Message Ingest
      description: |
        Receives ACARS messages from multiple sources (Hoppie, smartCARS, phpVMS, VAM,
        SimBrief, FS2Crew, PACX, generic). Processes OOOI times, position reports,
        PDC, weather, and telex messages. ACARS OOOI has priority 1 in the time
        extraction pipeline.
      operationId: ingestAcars
      security:
        - bearerAuth: []
        - apiKeyHeader: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - source
                - messages
              properties:
                source:
                  type: string
                  enum: [hoppie, smartcars, phpvms, vam, simbrief, fs2crew, pacx, generic]
                messages:
                  type: array
                  items:
                    type: object
                    required:
                      - type
                      - callsign
                    properties:
                      type:
                        type: string
                        enum: [oooi, position, progress, pdc, weather, telex]
                      callsign:
                        type: string
                        example: UAL123
                      timestamp:
                        type: string
                        format: date-time
                      payload:
                        type: object
      responses:
        '200':
          description: Messages processed
        '400':
          description: Validation error
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: Write access required

  /ingest/cdm:
    post:
      tags:
        - Ingest
      summary: CDM Milestone Ingest
      description: |
        Receives A-CDM milestone data from authoritative sources (vACDM, CDM Plugin,
        vATCSCC). Updates FIXM-aligned CDM timing fields and pilot readiness state.
      operationId: ingestCdm
      security:
        - bearerAuth: []
        - apiKeyHeader: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - updates
              properties:
                updates:
                  type: array
                  items:
                    type: object
                    required:
                      - callsign
                    properties:
                      callsign:
                        type: string
                        example: BAW117
                      gufi:
                        type: string
                        example: VAT-20260323-BAW117-EGLL-KJFK
                      airport:
                        type: string
                        example: EGLL
                      tobt:
                        type: string
                        format: date-time
                        description: Target Off-Block Time
                      tsat:
                        type: string
                        format: date-time
                        description: Target Startup Approval Time
                      ttot:
                        type: string
                        format: date-time
                        description: Target Takeoff Time
                      asat:
                        type: string
                        format: date-time
                        description: Actual Startup Approval Time
                      asrt:
                        type: string
                        format: date-time
                        description: Actual Startup Request Time
                      exot:
                        type: integer
                        description: Expected Taxi Out Time (minutes)
                      readiness_state:
                        type: string
                        enum: [PLANNING, BOARDING, READY, TAXIING, CANCELLED]
                      source:
                        type: string
                        example: VACDM
      responses:
        '200':
          description: Milestones processed
        '400':
          description: Validation error
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: Write access required

  /ingest/ctp:
    post:
      tags:
        - Ingest
      summary: CTP Slot Assignment Ingest
      description: |
        Receives slot assignment results from the CTP API after the
        SlotDistributionCreator optimizer runs. Updates flight control with EDCTs,
        route segments, and NAT track assignments.
      operationId: ingestCtpSlots
      security:
        - bearerAuth: []
        - apiKeyHeader: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - event_id
                - slots
              properties:
                event_id:
                  type: string
                  example: CTP2026W
                session_id:
                  type: integer
                source:
                  type: string
                  example: ctp-api
                slots:
                  type: array
                  items:
                    type: object
                    required:
                      - callsign
                      - dep_airport
                      - arr_airport
                      - departure_time
                    properties:
                      callsign:
                        type: string
                        example: BAW117
                      cid:
                        type: integer
                        example: 1234567
                      dep_airport:
                        type: string
                        example: EGLL
                      arr_airport:
                        type: string
                        example: KJFK
                      departure_time:
                        type: string
                        format: date-time
                      route_segments:
                        type: array
                        items:
                          type: object
                      slot_delay_min:
                        type: integer
      responses:
        '200':
          description: Slot assignments processed
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: CTP write access required

  /ingest/ctp_event:
    post:
      tags:
        - Ingest
      summary: CTP Event Sync
      description: |
        Creates or updates a CTP session and throughput configuration based on
        event data pushed from the CTP API. Enables the CTP API to be the event
        creation point.
      operationId: ingestCtpEvent
      security:
        - bearerAuth: []
        - apiKeyHeader: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - event_id
                - direction
                - departure_window_start
                - departure_window_end
              properties:
                event_id:
                  type: string
                  example: CTP2026W
                title:
                  type: string
                  example: Cross the Pond Westbound 2026
                direction:
                  type: string
                  enum: [WESTBOUND, EASTBOUND, BOTH]
                departure_window_start:
                  type: string
                  format: date-time
                departure_window_end:
                  type: string
                  format: date-time
                constrained_firs:
                  type: array
                  items:
                    type: string
                  example: [CZQX, BIRD, EGGX, LPPO]
                slot_interval_min:
                  type: integer
                  default: 5
                airports:
                  type: array
                  items:
                    type: object
                    properties:
                      identifier:
                        type: string
                        example: EGLL
                      max_acph:
                        type: integer
                        example: 38
                route_segments:
                  type: array
                  items:
                    type: object
                    properties:
                      identifier:
                        type: string
                        example: NATA
                      group:
                        type: string
                        example: NAT
                      max_acph:
                        type: integer
                        example: 25
      responses:
        '200':
          description: Session created or updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      session_id:
                        type: integer
                      session_name:
                        type: string
                      action:
                        type: string
                        enum: [created, updated]
                      status:
                        type: string
                      throughput_configs:
                        type: object
                        properties:
                          created:
                            type: integer
                          updated:
                            type: integer
        '400':
          description: Validation error
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: CTP write access required
        '409':
          description: Session not modifiable (completed/cancelled)

  /ingest/simtraffic:
    post:
      tags:
        - Ingest
      summary: SimTraffic Flight Times Ingest
      description: |
        Receives SimTraffic flight timing data. Supports PUSH mode (SimTraffic sends
        data directly) and PULL mode (triggers fetch from SimTraffic API). Maps
        SimTraffic departure/arrival timing fields to SWIM OOOI and metering columns.
      operationId: ingestSimtraffic
      security:
        - bearerAuth: []
        - apiKeyHeader: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - mode
              properties:
                mode:
                  type: string
                  enum: [push, pull]
                flights:
                  type: array
                  description: Required for push mode
                  items:
                    type: object
                    required:
                      - callsign
                    properties:
                      callsign:
                        type: string
                        example: UAL456
                      departure:
                        type: object
                      arrival:
                        type: object
                      status:
                        type: object
      responses:
        '200':
          description: Flight times processed
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: Write access required

  /ingest/vnas/controllers:
    post:
      tags:
        - Ingest
      summary: vNAS Controller Data Ingest
      description: |
        Receives controller data from vNAS (ERAM/STARS) systems and enriches
        swim_controllers rows with sector assignments, position IDs, and role data.
      operationId: ingestVnasControllers
      security:
        - bearerAuth: []
        - apiKeyHeader: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - controllers
              properties:
                controllers:
                  type: array
                  items:
                    type: object
                    properties:
                      artccId:
                        type: string
                        example: ZDC
                      role:
                        type: string
                        example: Controller
                      isObserver:
                        type: boolean
                      vatsimData:
                        type: object
                        properties:
                          cid:
                            type: integer
                            example: 1234567
                          callsign:
                            type: string
                            example: ZDC_CTR
      responses:
        '200':
          description: Controller data enriched
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: Write access required

  /ingest/vnas/handoff:
    post:
      tags:
        - Ingest
      summary: vNAS Handoff Data Ingest
      description: |
        Receives handoff data from vNAS (ERAM/STARS) systems. Updates handoff state
        in swim_flights and logs transitions in swim_handoff_log.
      operationId: ingestVnasHandoff
      security:
        - bearerAuth: []
        - apiKeyHeader: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - facility_id
                - handoffs
              properties:
                facility_id:
                  type: string
                  example: ZDC
                handoffs:
                  type: array
                  items:
                    type: object
                    required:
                      - callsign
                      - handoff_type
                      - from_sector
                      - to_sector
                      - status
                      - initiated_at
                    properties:
                      callsign:
                        type: string
                        example: UAL123
                      gufi:
                        type: string
                      handoff_type:
                        type: string
                        enum: [AUTOMATED, MANUAL, POINT_OUT]
                      from_sector:
                        type: string
                        example: ZDC_33_CTR
                      to_sector:
                        type: string
                        example: ZNY_42_CTR
                      status:
                        type: string
                        enum: [INITIATED, ACCEPTED, REJECTED, RECALLED, COMPLETED]
                      initiated_at:
                        type: string
                        format: date-time
      responses:
        '200':
          description: Handoff data processed
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: Write access required

  /ingest/vnas/tags:
    post:
      tags:
        - Ingest
      summary: vNAS Automation Tags Ingest
      description: |
        Receives automation tag data from vNAS (ERAM/STARS) systems. Updates assigned
        altitudes, speeds, headings, scratchpads, and coordination status.
      operationId: ingestVnasTags
      security:
        - bearerAuth: []
        - apiKeyHeader: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - facility_id
                - system_type
                - tags
              properties:
                facility_id:
                  type: string
                  example: ZDC
                system_type:
                  type: string
                  enum: [ERAM, STARS]
                tags:
                  type: array
                  items:
                    type: object
                    required:
                      - callsign
                    properties:
                      callsign:
                        type: string
                        example: UAL123
                      assigned_altitude:
                        type: integer
                        example: 35000
                      assigned_speed:
                        type: integer
                        example: 280
                      assigned_heading:
                        type: integer
                        example: 270
                      scratchpad:
                        type: string
                        example: KJFK/31L
      responses:
        '200':
          description: Tag data processed
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: Write access required

  /ingest/vnas/track:
    post:
      tags:
        - Ingest
      summary: vNAS Track/Surveillance Data Ingest
      description: |
        Receives real-time track/surveillance data from vNAS (ERAM/STARS) systems.
        Updates position, track quality, and surveillance data in swim_flights.
      operationId: ingestVnasTrack
      security:
        - bearerAuth: []
        - apiKeyHeader: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - facility_id
                - system_type
                - tracks
              properties:
                facility_id:
                  type: string
                  example: ZDC
                system_type:
                  type: string
                  enum: [ERAM, STARS]
                tracks:
                  type: array
                  items:
                    type: object
                    required:
                      - callsign
                      - position
                    properties:
                      callsign:
                        type: string
                        example: UAL123
                      beacon_code:
                        type: string
                        example: '1234'
                      position:
                        type: object
                        required:
                          - latitude
                          - longitude
                        properties:
                          latitude:
                            type: number
                            example: 40.6413
                          longitude:
                            type: number
                            example: -73.7781
                          altitude_ft:
                            type: integer
                            example: 35000
      responses:
        '200':
          description: Track data processed
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: Write access required

  # ==========================================================================
  # API Key Management
  # ==========================================================================

  /keys/provision:
    post:
      tags:
        - Keys
      summary: Provision API Key
      description: |
        Auto-provisions API keys for pilot clients after VATSIM OAuth authentication.
        Creates developer-tier keys tied to the pilot's VATSIM CID.
      operationId: provisionApiKey
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - access_token
              properties:
                access_token:
                  type: string
                  description: VATSIM OAuth access token
                client_name:
                  type: string
                  description: Name of the requesting client application
                client_version:
                  type: string
                  description: Version of the requesting client
      responses:
        '200':
          description: API key provisioned
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  api_key:
                    type: string
                    example: swim_dev_a1b2c3d4e5f6
                  tier:
                    type: string
                    example: developer
                  rate_limit:
                    type: integer
                    example: 300
                  cid:
                    type: integer
                    example: 1234567
        '400':
          description: Missing access_token
        '401':
          description: Invalid VATSIM OAuth token

  /keys/revoke:
    post:
      tags:
        - Keys
      summary: Revoke API Key
      description: |
        Allows users to revoke their own API keys. Requires VATSIM OAuth token
        for identity verification.
      operationId: revokeApiKey
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - access_token
              properties:
                access_token:
                  type: string
                  description: VATSIM OAuth access token
                api_key:
                  type: string
                  description: Specific key to revoke (revokes all if omitted)
                client_name:
                  type: string
                  description: Revoke keys for specific client only
      responses:
        '200':
          description: Key(s) revoked
        '400':
          description: Missing access_token
        '401':
          description: Invalid VATSIM OAuth token

  # ==========================================================================
  # Additional Playbook Endpoints
  # ==========================================================================

  /playbook/analysis:
    get:
      tags:
        - Playbook
      summary: Playbook Route Analysis
      description: |
        Provides facility traversal, distance, and time analysis for playbook routes.
        Proxies to the internal PostGIS analysis API with SWIM API key authentication.
      operationId: getPlaybookAnalysis
      security:
        - bearerAuth: []
        - apiKeyHeader: []
      parameters:
        - name: route_id
          in: query
          description: Playbook route ID for stored route analysis
          schema:
            type: integer
        - name: route_string
          in: query
          description: Route string for ad-hoc analysis
          schema:
            type: string
          example: KJFK MERIT J64 BETTE NATA MALOT EGLL
        - name: origin
          in: query
          description: Origin airport (required with route_string)
          schema:
            type: string
          example: KJFK
        - name: dest
          in: query
          description: Destination airport (required with route_string)
          schema:
            type: string
          example: EGLL
      responses:
        '200':
          description: Route analysis with waypoints, distances, and facility traversals
        '400':
          description: Missing required parameters
        '401':
          $ref: '#/components/responses/Unauthorized'

  /playbook/throughput:
    get:
      tags:
        - Playbook
      summary: Get Route Throughput Data
      description: |
        Returns throughput data (planned counts, slot counts, peak rates) for
        a playbook play's routes.
      operationId: getPlaybookThroughput
      security:
        - bearerAuth: []
        - apiKeyHeader: []
      parameters:
        - name: play_id
          in: query
          description: Playbook play ID
          schema:
            type: integer
      responses:
        '200':
          description: Throughput data for play routes
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      tags:
        - Playbook
      summary: Ingest Route Throughput Data
      description: |
        CTP pushes per-route throughput data (planned counts, slot counts, peak
        rates) for display on Playbook and Route pages. Requires write access.
      operationId: ingestPlaybookThroughput
      security:
        - bearerAuth: []
        - apiKeyHeader: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                route_id:
                  type: integer
                play_id:
                  type: integer
                throughput:
                  type: object
                  properties:
                    planned_count:
                      type: integer
      responses:
        '200':
          description: Throughput data stored
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: Write access required

  # ==========================================================================
  # Additional TMI Endpoints
  # ==========================================================================

  /tmi:
    get:
      tags:
        - TMI
      summary: TMI Overview
      description: |
        Returns an overview of TMI data with active counts for programs, advisories,
        entries, reroutes, public routes, and flow events/measures.
      operationId: getTmiOverview
      security:
        - bearerAuth: []
        - apiKeyHeader: []
      responses:
        '200':
          description: TMI overview with active counts
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      active_entries:
                        type: integer
                      active_programs:
                        type: integer
                      active_advisories:
                        type: integer
                      active_reroutes:
                        type: integer
                      active_public_routes:
                        type: integer
                      active_flow_events:
                        type: integer
                      active_flow_measures:
                        type: integer

  /tmi/advisories:
    get:
      tags:
        - TMI
      summary: TMI Advisories
      description: |
        Returns formal TMI advisories (Ground Stop, GDP, Reroute, etc.) from
        the SWIM_API mirror tables. Supports filtering by type, airport, facility,
        status, and pagination.
      operationId: getTmiAdvisories
      security:
        - bearerAuth: []
        - apiKeyHeader: []
      parameters:
        - name: type
          in: query
          description: Comma-separated advisory type filter (GS, GDP, REROUTE, etc.)
          schema:
            type: string
          example: GS,GDP
        - name: airport
          in: query
          description: Filter by affected airport
          schema:
            type: string
          example: KJFK
        - name: facility
          in: query
          description: Filter by issuing facility
          schema:
            type: string
          example: ZNY
        - name: active_only
          in: query
          description: Only return active advisories
          schema:
            type: string
            default: 'true'
        - $ref: '#/components/parameters/page'
        - $ref: '#/components/parameters/per_page'
      responses:
        '200':
          description: Paginated advisory list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /tmi/entries:
    get:
      tags:
        - TMI
      summary: TMI Log Entries
      description: |
        Returns NTML log entries (MIT, MINIT, STOP, APREQ, CFR, TBM, DELAY, CONFIG)
        from the SWIM_API mirror tables.
      operationId: getTmiEntries
      security:
        - bearerAuth: []
        - apiKeyHeader: []
      parameters:
        - name: type
          in: query
          description: Comma-separated entry type filter
          schema:
            type: string
          example: MIT,STOP
        - name: airport
          in: query
          description: Filter by affected airport
          schema:
            type: string
          example: KJFK
        - name: active_only
          in: query
          description: Only return active entries
          schema:
            type: string
            default: 'true'
        - $ref: '#/components/parameters/page'
        - $ref: '#/components/parameters/per_page'
      responses:
        '200':
          description: Paginated entry list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /tmi/measures:
    get:
      tags:
        - TMI
      summary: Unified TMI Measures
      description: |
        Returns ALL traffic management measures from both vATCSCC (GS/GDP/AFP,
        MIT/MINIT) and external providers (ECFMP, NavCanada, VATPAC). Unified
        TFMS/FIXM-aligned output format for global interoperability.
      operationId: getTmiMeasures
      security:
        - bearerAuth: []
        - apiKeyHeader: []
      parameters:
        - name: provider
          in: query
          description: Comma-separated provider filter
          schema:
            type: string
          example: VATCSCC,ECFMP
        - name: type
          in: query
          description: Comma-separated measure type filter
          schema:
            type: string
          example: GS,GDP,MIT
        - name: airport
          in: query
          description: Filter by affected airport
          schema:
            type: string
          example: KJFK
        - name: region
          in: query
          description: Comma-separated region filter
          schema:
            type: string
          example: NAM,EUR
        - $ref: '#/components/parameters/page'
        - $ref: '#/components/parameters/per_page'
      responses:
        '200':
          description: Unified measures list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /tmi/routes:
    get:
      tags:
        - TMI
      summary: TMI Public Routes
      description: |
        Returns published TMI route visualizations. Supports GeoJSON output format
        for map display.
      operationId: getTmiRoutes
      security:
        - bearerAuth: []
        - apiKeyHeader: []
      parameters:
        - name: id
          in: query
          description: Get a specific route by ID
          schema:
            type: integer
        - name: format
          in: query
          description: Output format
          schema:
            type: string
            enum: [json, geojson]
            default: json
      responses:
        '200':
          description: Public routes list
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      tags:
        - TMI
      summary: Create TMI Public Route
      description: Creates a new published route visualization. Requires write access.
      operationId: createTmiRoute
      security:
        - bearerAuth: []
        - apiKeyHeader: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Route created
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: Write access required

  /tmi/nat_tracks/metrics:
    get:
      tags:
        - TMI
      summary: NAT Track Metrics
      description: |
        Returns throughput metrics for North Atlantic Tracks including flight counts,
        flow rates, and capacity utilization.
      operationId: getNatTrackMetrics
      security:
        - bearerAuth: []
        - apiKeyHeader: []
      responses:
        '200':
          description: NAT track metrics
        '401':
          $ref: '#/components/responses/Unauthorized'

  /tmi/nat_tracks/status:
    get:
      tags:
        - TMI
      summary: NAT Track Status
      description: |
        Returns current status of North Atlantic Tracks including active tracks,
        direction, validity windows, and flight assignments.
      operationId: getNatTrackStatus
      security:
        - bearerAuth: []
        - apiKeyHeader: []
      responses:
        '200':
          description: NAT track status
        '401':
          $ref: '#/components/responses/Unauthorized'

  # ==========================================================================
  # External Flow Management
  # ==========================================================================

  /tmi/flow:
    get:
      tags:
        - TMI
        - Flow
      summary: Flow Management Overview
      description: |
        Returns overview of external flow management data including provider counts,
        active events, and active measures.
      operationId: getFlowOverview
      security:
        - bearerAuth: []
        - apiKeyHeader: []
      responses:
        '200':
          description: Flow management overview
        '401':
          $ref: '#/components/responses/Unauthorized'

  /tmi/flow/events:
    get:
      tags:
        - TMI
        - Flow
      summary: Flow Events
      description: |
        Returns special events (CTP, FNO, etc.) from external flow management
        providers. FIXM-aligned output.
      operationId: getFlowEvents
      security:
        - bearerAuth: []
        - apiKeyHeader: []
      parameters:
        - name: provider
          in: query
          description: Filter by provider
          schema:
            type: string
          example: ECFMP
        - name: code
          in: query
          description: Filter by event code
          schema:
            type: string
          example: CTP2026
        - name: status
          in: query
          description: Filter by event status
          schema:
            type: string
            enum: [ACTIVE, COMPLETED, CANCELLED]
        - name: include_participants
          in: query
          description: Include participant list
          schema:
            type: string
            enum: ['true', 'false']
      responses:
        '200':
          description: Flow events
        '401':
          $ref: '#/components/responses/Unauthorized'

  /tmi/flow/measures:
    get:
      tags:
        - TMI
        - Flow
      summary: Flow Measures
      description: |
        Returns flow measures (MIT, MINIT, MDI, GS, etc.) from external
        flow management providers. TFMS/FIXM-aligned structure.
      operationId: getFlowMeasures
      security:
        - bearerAuth: []
        - apiKeyHeader: []
      parameters:
        - name: provider
          in: query
          description: Filter by provider
          schema:
            type: string
          example: ECFMP
        - name: type
          in: query
          description: Comma-separated measure type filter
          schema:
            type: string
          example: MIT,MDI
        - name: event_id
          in: query
          description: Filter by parent event ID
          schema:
            type: integer
        - name: airport
          in: query
          description: Filter by affected airport
          schema:
            type: string
          example: EGLL
      responses:
        '200':
          description: Flow measures
        '401':
          $ref: '#/components/responses/Unauthorized'

  /tmi/flow/providers:
    get:
      tags:
        - TMI
        - Flow
      summary: Flow Providers
      description: |
        Returns registered external flow management providers. Supports ECFMP,
        NavCanada, VATPAC, and future integrations.
      operationId: getFlowProviders
      security:
        - bearerAuth: []
        - apiKeyHeader: []
      parameters:
        - name: active_only
          in: query
          description: Only return active providers
          schema:
            type: string
            enum: ['true', 'false']
            default: 'true'
        - name: region
          in: query
          description: Comma-separated region filter
          schema:
            type: string
          example: EUR,NAT
      responses:
        '200':
          description: Flow providers
        '401':
          $ref: '#/components/responses/Unauthorized'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      description: |
        API key with tier prefix (preferred method):
        - `swim_sys_*` - System tier (30,000 req/min, full write)
        - `swim_par_*` - Partner tier (3,000 req/min, limited write)
        - `swim_dev_*` - Developer tier (300 req/min, read-only)
        - `swim_pub_*` - Public tier (100 req/min, read-only)
    apiKeyHeader:
      type: apiKey
      in: header
      name: X-API-Key
      description: |
        Alternative authentication via X-API-Key header.
        Use this if Authorization header doesn't work (e.g., IIS environments).
        Same API key format as Bearer auth.

  parameters:
    page:
      name: page
      in: query
      description: Page number for pagination
      schema:
        type: integer
        minimum: 1
        maximum: 1000
        default: 1
    per_page:
      name: per_page
      in: query
      description: Results per page
      schema:
        type: integer
        minimum: 1
        maximum: 1000
        default: 100
    format:
      name: format
      in: query
      description: |
        Response format. Available formats vary by endpoint:

        **Flights endpoint** (`/flights`):
        - `json` (default): Standard JSON with snake_case field names
        - `fixm`: JSON with FIXM 4.3.0 camelCase field names
        - `xml`: XML format for enterprise/SOAP integrations
        - `geojson`: GeoJSON FeatureCollection for mapping (Leaflet, Mapbox)
        - `csv`: CSV for spreadsheet/analytics export
        - `kml`: KML for Google Earth visualization
        - `ndjson`: Newline-delimited JSON for streaming/bulk processing

        **Metering endpoint** (`/metering`):
        - `json`, `fixm`, `xml`, `csv`, `ndjson` (no geojson/kml - data isn't spatial)

        **Positions endpoint** (`/positions`):
        - All formats supported
      schema:
        type: string
        enum: [fixm, json, xml, geojson, csv, kml, ndjson]
        default: fixm
      example: fixm

  responses:
    Unauthorized:
      description: Authentication failed
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            missing_header:
              summary: Missing Authorization header
              value:
                error: true
                message: Missing Authorization header
                status: 401
                code: UNAUTHORIZED
            invalid_key:
              summary: Invalid API key
              value:
                error: true
                message: API key not found or inactive
                status: 401
                code: UNAUTHORIZED
    RateLimitExceeded:
      description: Rate limit exceeded
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error: true
            message: Rate limit exceeded
            status: 429
            code: RATE_LIMIT
    ServerError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error: true
            message: Database error
            status: 500
            code: DB_ERROR

  schemas:
    CDR:
      type: object
      description: Coded Departure Route
      properties:
        cdr_id:
          type: integer
          description: Unique CDR identifier
        cdr_code:
          type: string
          description: CDR code (e.g., JFKORDNB)
          example: JFKORDNB
        full_route:
          type: string
          description: Full route string
          example: KJFK GREKI J584 CUTTA COATE4 KORD
        origin_icao:
          type: string
          description: Origin airport ICAO code
          example: KJFK
        dest_icao:
          type: string
          description: Destination airport ICAO code
          example: KORD
        dep_artcc:
          type: string
          description: Departure ARTCC
          example: ZNY
        arr_artcc:
          type: string
          description: Arrival ARTCC
          example: ZAU
        direction:
          type: string
          nullable: true
          description: Route direction (NORTH, SOUTH, EAST, WEST)
        altitude_min_ft:
          type: integer
          nullable: true
          description: Minimum altitude in feet
        altitude_max_ft:
          type: integer
          nullable: true
          description: Maximum altitude in feet
        is_active:
          type: boolean
          description: Whether the CDR is currently active
        source:
          type: string
          description: Data source identifier

    PlaybookPlay:
      type: object
      description: Playbook play with optional routes
      properties:
        play_id:
          type: integer
        play_name:
          type: string
          example: KENPA_2601
        display_name:
          type: string
          nullable: true
        description:
          type: string
          nullable: true
        category:
          type: string
          nullable: true
        facilities_involved:
          type: string
          nullable: true
          description: Comma-separated list of involved ARTCCs
        scenario_type:
          type: string
          nullable: true
        route_format:
          type: string
          enum: [standard, split]
        source:
          type: string
          enum: [FAA, DCC, ECFMP, CANOC]
        status:
          type: string
          enum: [active, draft, archived]
        route_count:
          type: integer
        visibility:
          type: string
          enum: [public, local, private_users, private_org]
        routes:
          type: array
          description: Included only when fetching a single play by ID
          items:
            $ref: '#/components/schemas/PlaybookRoute'
        metadata:
          type: object
          properties:
            created_by:
              type: string
              nullable: true
            updated_by:
              type: string
              nullable: true
            created_at:
              type: string
              format: date-time
              nullable: true
            updated_at:
              type: string
              format: date-time
              nullable: true

    PlaybookRoute:
      type: object
      description: A route within a playbook play
      properties:
        route_id:
          type: integer
        route_string:
          type: string
          example: KJFK GREKI J584 CUTTA COATE4 KORD
        origin:
          type: string
          nullable: true
        dest:
          type: string
          nullable: true
        scope:
          type: object
          properties:
            origin_airports:
              type: array
              items:
                type: string
            origin_tracons:
              type: array
              items:
                type: string
            origin_artccs:
              type: array
              items:
                type: string
            dest_airports:
              type: array
              items:
                type: string
            dest_tracons:
              type: array
              items:
                type: string
            dest_artccs:
              type: array
              items:
                type: string
        traversal:
          type: object
          properties:
            artccs:
              type: array
              items:
                type: string
            tracons:
              type: array
              items:
                type: string
        remarks:
          type: string
          nullable: true
        sort_order:
          type: integer

    ErrorResponse:
      type: object
      required:
        - error
        - message
        - status
      properties:
        error:
          type: boolean
          example: true
        message:
          type: string
        status:
          type: integer
        code:
          type: string

    ApiInfoResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: object
          properties:
            name:
              type: string
            version:
              type: string
            description:
              type: string
            documentation:
              type: string
            endpoints:
              type: object
            authentication:
              type: object
            contact:
              type: object
        timestamp:
          type: string
          format: date-time
        meta:
          type: object

    FlightIdentity:
      type: object
      properties:
        callsign:
          type: string
          example: UAL123
        cid:
          type: integer
          description: VATSIM CID
          example: 1234567
        aircraft_type:
          type: string
          example: B738
        aircraft_icao:
          type: string
          example: B738
        aircraft_faa:
          type: string
          example: B738/L
        weight_class:
          type: string
          enum: [L, M, H, J]
          example: L
        wake_category:
          type: string
          enum: [L, M, H, J]
        airline_icao:
          type: string
          example: UAL
        airline_name:
          type: string
          example: United Airlines

    FlightPlan:
      type: object
      properties:
        departure:
          type: string
          description: Departure airport ICAO
          example: KJFK
        destination:
          type: string
          description: Destination airport ICAO
          example: KLAX
        alternate:
          type: string
          description: Alternate airport ICAO
          example: KONT
        cruise_altitude:
          type: integer
          description: Filed cruise altitude (feet)
          example: 35000
        cruise_speed:
          type: integer
          description: Filed TAS (knots)
          example: 450
        route:
          type: string
          description: Filed route string
          example: DEEZZ5 DEEZZ J584 ORD J64 RIIVR2
        remarks:
          type: string
        flight_rules:
          type: string
          enum: [I, V, Y, Z]
          example: I
        departure_artcc:
          type: string
          example: ZNY
        destination_artcc:
          type: string
          example: ZLA
        departure_tracon:
          type: string
          example: N90
        destination_tracon:
          type: string
          example: SCT
        departure_fix:
          type: string
          example: DEEZZ
        departure_procedure:
          type: string
          example: DEEZZ5
        arrival_fix:
          type: string
          example: RIIVR
        arrival_procedure:
          type: string
          example: RIIVR2
        departure_runway:
          type: string
          example: 31L
        arrival_runway:
          type: string
          example: 25L

    FlightPosition:
      type: object
      properties:
        latitude:
          type: number
          format: double
          example: 40.6413
        longitude:
          type: number
          format: double
          example: -73.7781
        altitude_ft:
          type: integer
          example: 35000
        heading:
          type: integer
          minimum: 0
          maximum: 360
          example: 270
        ground_speed_kts:
          type: integer
          example: 485
        true_airspeed_kts:
          type: integer
          example: 450
        vertical_rate_fpm:
          type: integer
          example: 0
        current_artcc:
          type: string
          example: ZKC
        current_tracon:
          type: string
        current_zone:
          type: string
          enum: [RAMP, TAXI, DEPARTURE, TERMINAL, ENROUTE, ARRIVAL, APPROACH, SURFACE]

    FlightProgress:
      type: object
      properties:
        phase:
          type: string
          enum: [PROPOSED, DEPARTING, ENROUTE, DESCENT, ARRIVED, COMPLETED]
          example: ENROUTE
        is_active:
          type: boolean
          example: true
        distance_remaining_nm:
          type: number
          format: double
          example: 1234.5
        distance_flown_nm:
          type: number
          format: double
          example: 567.8
        gcd_nm:
          type: number
          format: double
          description: Great circle distance
          example: 2145.3
        route_total_nm:
          type: number
          format: double
          description: Total route distance
          example: 2234.7
        pct_complete:
          type: number
          format: double
          example: 45.2
        time_to_dest_min:
          type: number
          format: double
          example: 152.3

    FlightTimes:
      type: object
      properties:
        etd:
          type: string
          format: date-time
          description: Estimated time of departure
        etd_runway:
          type: string
          format: date-time
        eta:
          type: string
          format: date-time
          description: Estimated time of arrival
        eta_runway:
          type: string
          format: date-time
        eta_source:
          type: string
          example: CALCULATED
        eta_method:
          type: string
          example: GROUNDSPEED
        ete_minutes:
          type: integer
          description: Estimated time enroute
        out:
          type: string
          format: date-time
          description: OOOI - Out (pushback)
        off:
          type: string
          format: date-time
          description: OOOI - Off (takeoff)
        "on":
          type: string
          format: date-time
          description: OOOI - On (landing)
        in:
          type: string
          format: date-time
          description: OOOI - In (gate arrival)
        ctd:
          type: string
          format: date-time
          description: Controlled time of departure
        cta:
          type: string
          format: date-time
          description: Controlled time of arrival
        edct:
          type: string
          format: date-time
          description: Expect Departure Clearance Time

    FlightTmi:
      type: object
      description: Traffic Management Initiative data
      properties:
        is_controlled:
          type: boolean
          description: Flight is under some form of TMI control
          example: true
        ground_stop_held:
          type: boolean
          description: Flight is held due to Ground Stop
          example: false
        gs_release:
          type: string
          format: date-time
          description: Expected Ground Stop release time
        control_type:
          type: string
          enum: [GDP, GS, AFP, REROUTE, MIT, MINIT]
          example: GDP
        control_program:
          type: string
          description: Name of controlling program
          example: KJFK/GDP/WX
        control_element:
          type: string
          description: Controlled element (airport, fix, etc.)
          example: KJFK
        is_exempt:
          type: boolean
          example: false
        exempt_reason:
          type: string
        delay_minutes:
          type: integer
          example: 45
        delay_status:
          type: string
        slot_time:
          type: string
          format: date-time
          description: Assigned slot time
        program_id:
          type: integer
        slot_id:
          type: integer

    Flight:
      type: object
      description: Flight record with nested data sections
      properties:
        gufi:
          type: string
          description: Globally Unique Flight Identifier
          example: VAT-20260115-UAL123-KJFK-KLAX
        flight_uid:
          type: integer
          format: int64
        flight_key:
          type: string
        identity:
          $ref: '#/components/schemas/FlightIdentity'
        flight_plan:
          $ref: '#/components/schemas/FlightPlan'
        position:
          $ref: '#/components/schemas/FlightPosition'
        progress:
          $ref: '#/components/schemas/FlightProgress'
        times:
          $ref: '#/components/schemas/FlightTimes'
        tmi:
          $ref: '#/components/schemas/FlightTmi'
        _source:
          type: string
          example: vatcscc
        _first_seen:
          type: string
          format: date-time
        _last_seen:
          type: string
          format: date-time
        _logon_time:
          type: string
          format: date-time
        _last_sync:
          type: string
          format: date-time
          description: Last sync from VATSIM_ADL (SWIM_API only)

    Pagination:
      type: object
      properties:
        total:
          type: integer
          example: 2456
        page:
          type: integer
          example: 1
        per_page:
          type: integer
          example: 100
        total_pages:
          type: integer
          example: 25
        has_more:
          type: boolean
          example: true

    FlightsListResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        data:
          type: array
          items:
            $ref: '#/components/schemas/Flight'
        pagination:
          $ref: '#/components/schemas/Pagination'
        timestamp:
          type: string
          format: date-time

    FlightDetailResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        data:
          $ref: '#/components/schemas/Flight'
        timestamp:
          type: string
          format: date-time
        meta:
          type: object
          properties:
            source:
              type: string
              example: vatcscc
            lookup_method:
              type: string
              enum: [gufi, flight_uid, flight_key]
            schema_version:
              type: string
              example: normalized_v2

    PositionFeature:
      type: object
      properties:
        type:
          type: string
          enum: [Feature]
        id:
          type: integer
          format: int64
          description: flight_uid
        geometry:
          type: object
          properties:
            type:
              type: string
              enum: [Point]
            coordinates:
              type: array
              items:
                type: number
              minItems: 2
              maxItems: 3
              description: "[longitude, latitude, altitude_ft?]"
              example: [-95.5, 38.9, 35000]
        properties:
          type: object
          properties:
            flight_uid:
              type: integer
            callsign:
              type: string
            flight_key:
              type: string
            aircraft:
              type: string
            weight_class:
              type: string
            wake_category:
              type: string
            departure:
              type: string
            destination:
              type: string
            phase:
              type: string
            dest_artcc:
              type: string
            current_artcc:
              type: string
            altitude:
              type: integer
            heading:
              type: integer
            groundspeed:
              type: integer
            vertical_rate:
              type: integer
            distance_remaining_nm:
              type: number
            gcd_nm:
              type: number
            pct_complete:
              type: number
            tmi_status:
              type: string
              enum: [none, ground_stop, gdp, afp, reroute, mit]
            eta:
              type: string
              format: date-time
            ete_minutes:
              type: integer
            route_string:
              type: string
              description: Only included if include_route=true

    PositionsGeoJSON:
